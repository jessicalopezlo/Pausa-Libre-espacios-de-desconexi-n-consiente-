<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pausa Libre</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f1ea;
  margin:0;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  color:#4b5b4b;
  margin-bottom:30px;
}

.logo{
  display:block;
  margin:0 auto 30px;
  width:200px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  overflow:hidden;
}

.card img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.card h3{
  text-align:center;
  padding:15px;
  color:#4b5b4b;
}
</style>

</head>

<body>

<div class="container">

<h1>Pausa Libre - Desconexión Consciente</h1>

<img src="logo.jpeg" class="logo">

<div class="grid">

<div class="card">
<img src="recepcion1.jpeg">
<h3>Recepción</h3>
</div>

<div class="card">
<img src="cabina_masajes.jpeg">
<h3>Cabina de Masajes</h3>
</div>

<div class="card">
<img src="sala_masajes.jpeg">
<h3>Sala de Masajes</h3>
</div>

<div class="card">
<img src="sala_masajes2.jpeg">
<h3>Sala de Masajes 2</h3>
</div>

<div class="card">
<img src="zona_desconexion.jpeg">
<h3>Zona de Desconexión</h3>
</div>

<div class="card">
<img src="cabana_relajacion.jpeg">
<h3>Cabina de Relajación</h3>
</div>

<div class="card">
<img src="sala_psicologia.jpeg">
<h3>Sala de Psicología</h3>
</div>

<div class="card">
<img src="terapia.jpeg">
<h3>Terapia</h3>
</div>

</div>

</div>

</body>
</html>
